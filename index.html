<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knapsack Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img src="public/splodges.png" id="bgSplash">
    <div id = "header">
    <img src="public/heading.png">
    </div>
    <div id = "UserInput">
        <p id="errorText"></p>
        <form>
            <input id="itemName" type="text" placeholder="Name" maxlength="7"><br>
            <input id="itemValue" type="number" min="1" max="7" required placeholder="Value"><br>
            <input id="itemWeight" type="number" min="1" max="7" required placeholder="W"><br>
            <div type="button" onclick="addItem()" id="addButton"><img src="public/addButton.png"></div>
            <div type="button" onclick="generateDP()" id="solveButton"><img src="public/solveButton.png"></div>
            <input id="capacity" type="number" min="1" max="7"required placeholder="C">
            
        </form>        
    </div>

    <div id="Display">
            <div id="TableDisplay">
                <table id="itemDisplay">
                    <tr>
                    <th>Name</th>
                    <th>Value</th>
                    <th>Weight</th>
                    </tr>
                </table>
            </div>
        <div id ="DPDisplay">
            <table id="dpDisplay"></table>
        </div>
    </div>
    <div id="SolutionDisplay">            
        <table id="solution">
        </table>
    </div>
    <script src = "script.js"></script>
</body>
</body>
</html>
